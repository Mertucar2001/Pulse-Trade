<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PulseTrade – Sign In</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="bg-grid"></div>
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="index.html"><span class="logo-icon">P</span> PulseTrade</a>
      <ul class="navbar-nav ms-auto" id="nav-links"></ul>
    </div>
  </nav>

  <div class="container login-hero">
    <div class="row align-items-center w-100 g-4">
      <div class="col-lg-6">
        <img src="images/login-hero.jpg" alt="PulseTrade investor" class="login-image" onerror="this.style.display='none'">
      </div>
      <div class="col-lg-6">
        <div class="card-glass p-4 p-md-5">
          <h1 class="fw-bold text-center mb-2">Sign In</h1>
          <p class="text-muted-custom text-center mb-4">Smart Investments, Better Future.</p>
          <form id="login-form">
            <div class="mb-3">
              <label class="form-label text-muted-custom">Email</label>
              <input type="email" class="form-control bg-dark text-white border-secondary" required>
            </div>
            <div class="mb-4">
              <label class="form-label text-muted-custom">Password</label>
              <input type="password" class="form-control bg-dark text-white border-secondary" required>
            </div>
            <button type="submit" class="btn btn-pulse w-100 py-2">Sign In</button>
          </form>
          <p class="text-center mt-3 mb-0"><a href="#" class="text-green text-decoration-none">Create Account</a></p>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.getElementById('nav-links').innerHTML = renderNav('login.html');
    document.getElementById('login-form').addEventListener('submit', (e) => {
      e.preventDefault();
      localStorage.setItem('pt_user', 'investor@pulsetrade.com');
      location.href = 'index.html';
    });
  </script>
</body>
</html>
