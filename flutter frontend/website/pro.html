<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PulseTrade Pro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="bg-grid"></div>
  <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="index.html"><span class="logo-icon">P</span> PulseTrade</a>
      <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav"><span class="navbar-toggler-icon"></span></button>
      <div class="collapse navbar-collapse" id="nav"><ul class="navbar-nav ms-auto" id="nav-links"></ul></div>
    </div>
  </nav>

  <main class="container py-5 text-center">
    <h1 class="fw-bold mb-2">PulseTrade Pro</h1>
    <p class="text-muted-custom mb-4">Unlock premium investment tools.</p>

    <div class="card-glass p-4 text-start mx-auto" style="max-width:480px">
      <div class="mb-3"><span class="text-green">✓</span> Advanced Analytics & Insights</div>
      <div class="mb-3"><span class="text-green">✓</span> Real-time Price Alerts</div>
      <div class="mb-3"><span class="text-green">✓</span> AI Stock Recommendations</div>
      <div class="mb-3"><span class="text-green">✓</span> Unlimited Watchlists</div>
      <div><span class="text-green">✓</span> Portfolio Performance Reports</div>
    </div>

    <h2 class="display-6 fw-bold mt-4" id="price-label">€4.99 / month</h2>
    <button class="btn btn-pulse btn-lg px-5 mt-3" id="upgrade-btn">Upgrade to Pro</button>
  </main>

  <footer class="text-center"><div class="container">PulseTrade © 2026</div></footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.getElementById('nav-links').innerHTML = renderNav('pro.html');
    const btn = document.getElementById('upgrade-btn');
    const label = document.getElementById('price-label');
    if (localStorage.getItem('pt_pro') === '1') {
      btn.textContent = 'Pro Active ✓';
      btn.disabled = true;
      label.textContent = 'You are a Pro member';
      label.classList.add('text-green');
    }
    btn.addEventListener('click', () => {
      localStorage.setItem('pt_pro', '1');
      btn.textContent = 'Pro Active ✓';
      btn.disabled = true;
      label.textContent = 'You are a Pro member';
      label.classList.add('text-green');
    });
  </script>
</body>
</html>
