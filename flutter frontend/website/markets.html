<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PulseTrade – Markets & News</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="bg-grid"></div>
  <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="index.html"><span class="logo-icon">P</span> PulseTrade</a>
      <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav"><span class="navbar-toggler-icon"></span></button>
      <div class="collapse navbar-collapse" id="nav"><ul class="navbar-nav ms-auto" id="nav-links"></ul></div>
    </div>
  </nav>

  <main class="container py-4">
    <h1 class="fw-bold mb-1">Markets & News</h1>
    <p class="text-muted-custom">Live stock prices and financial news for <span id="location-label">...</span></p>
    <div id="country-chips" class="mb-4"></div>

    <div class="input-group mb-4">
      <span class="input-group-text bg-dark border-secondary text-muted-custom">🔍</span>
      <input type="text" id="search" class="form-control bg-dark text-white border-secondary" placeholder="Search country or company...">
    </div>

    <h4 class="fw-bold mb-3">Stock Prices</h4>
    <div id="stocks-list"></div>

    <h4 class="fw-bold mt-4 mb-3">Latest News</h4>
    <div id="news-list"></div>
  </main>

  <footer class="text-center"><div class="container">PulseTrade © 2026</div></footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.getElementById('nav-links').innerHTML = renderNav('markets.html');

    function onDataReady() {
      const region = REGIONS[AppState.countryCode];
      document.getElementById('location-label').textContent = region.country;
      document.getElementById('stocks-list').innerHTML = AppState.stocks.map(s => stockRowHtml(s, true)).join('');
      document.getElementById('news-list').innerHTML = AppState.news.map(n => {
        const stock = AppState.stocks.find(s => s.symbol === n.symbol) || AppState.stocks[0];
        return `<div class="card-glass p-3 mb-2 stock-row" onclick="location.href='stock.html?symbol=${encodeURIComponent(stock.symbol)}&name=${encodeURIComponent(stock.name)}'">
          <div class="fw-bold">${n.title}</div>
          <div class="text-muted-custom small">${n.time} · ${n.category}</div>
        </div>`;
      }).join('');
      countryChipsHtml('country-chips');
      drawSparklines();
    }

    document.getElementById('search').addEventListener('input', (e) => {
      const q = e.target.value.toLowerCase();
      if (!q) { onDataReady(); return; }
      const regionMatch = Object.entries(REGIONS).find(([, r]) => r.country.toLowerCase().includes(q));
      if (regionMatch) { AppState.countryCode = regionMatch[0]; refreshPageData(); return; }
      const filtered = AppState.stocks.filter(s => s.name.toLowerCase().includes(q) || s.symbol.toLowerCase().includes(q));
      document.getElementById('stocks-list').innerHTML = filtered.map(s => stockRowHtml(s, true)).join('') || '<p class="text-muted-custom">No results.</p>';
      drawSparklines();
    });

    (async () => { await initApp(); await loadStocksAndNews(); onDataReady(); })();
  </script>
</body>
</html>
