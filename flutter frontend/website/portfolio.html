<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PulseTrade – Portfolio</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="bg-grid"></div>
  <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="index.html"><span class="logo-icon">P</span> PulseTrade</a>
      <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav"><span class="navbar-toggler-icon"></span></button>
      <div class="collapse navbar-collapse" id="nav"><ul class="navbar-nav ms-auto" id="nav-links"></ul></div>
    </div>
  </nav>

  <main class="container py-4">
    <h1 class="fw-bold">Portfolio</h1>
    <p class="text-muted-custom">Track your investments</p>
    <div id="currency-chips" class="mb-4"></div>

    <div class="card-glass p-4 mb-4">
      <div class="text-muted-custom">Total Balance</div>
      <h2 class="display-6 fw-bold" id="total-balance">€124,820.50</h2>
      <span class="text-green fw-bold">+5.23% Today ▲</span>
    </div>

    <h4 class="fw-bold mb-3">Holdings</h4>
    <div class="table-responsive card-glass p-3">
      <table class="table table-dark table-borderless mb-0">
        <thead><tr class="text-muted-custom"><th>Asset</th><th>Shares</th><th>Value</th><th>Change</th></tr></thead>
        <tbody id="holdings"></tbody>
      </table>
    </div>
  </main>

  <footer class="text-center"><div class="container">PulseTrade © 2026</div></footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.getElementById('nav-links').innerHTML = renderNav('portfolio.html');
    const shares = [120, 80, 10];

    function onDataReady() {
      document.getElementById('total-balance').textContent = formatPrice(124820.5, 'EUR');
      document.getElementById('holdings').innerHTML = AppState.stocks.slice(0, 3).map((s, i) => {
        const val = convertPrice(s.price, s.currency, AppState.currency) * shares[i];
        const cls = s.isUp ? 'text-green' : 'text-red';
        return `<tr>
          <td><strong>${s.name}</strong><br><small class="text-muted-custom">${s.symbol}</small></td>
          <td>${shares[i]}</td>
          <td>${currencySymbol(AppState.currency)}${val.toFixed(2)}</td>
          <td class="${cls}">${s.isUp ? '+' : ''}${s.changePercent.toFixed(2)}%</td>
        </tr>`;
      }).join('');
      currencyChipsHtml('currency-chips');
    }

    (async () => { await initApp(); await loadStocksAndNews(); onDataReady(); })();
  </script>
</body>
</html>
