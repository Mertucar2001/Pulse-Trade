name: pulsetrade
description: "PulseTrade - Stock Market Mobile App. Final Project Frontend Programming."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.11.5 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  http: ^1.2.2
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  fl_chart: ^0.69.2
  shared_preferences: ^2.3.3
  url_launcher: ^6.3.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/pulsetrade_bg.png

  # To add assets to your application, add an assets section, like this:
  # assets:
